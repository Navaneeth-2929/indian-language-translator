<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random User Generator</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  background: linear-gradient(-45deg, #667eea, #764ba2, #ff6ec4, #7873f5);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  perspective: 1200px;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Card */
.card {
  position: relative;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.15);
  padding: 30px;
  width: 340px;
  border-radius: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  transition: transform 0.1s ease;
  transform-style: preserve-3d;
}

.card img {
  border-radius: 50%;
  width: 120px;
  border: 4px solid white;
  margin-bottom: 15px;
  transition: transform 0.4s ease;
  transform: translateZ(40px);
}

.card h2,
.card p,
button {
  transform: translateZ(30px);
}

button {
  margin-top: 15px;
  padding: 10px 25px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #764ba2;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
}

button:hover {
  background: #764ba2;
  color: white;
}

/* Glare effect */
.glare {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4), transparent 60%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

/* Watermark */
.watermark {
  position: fixed;
  bottom: 15px;
  right: 20px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  opacity: 0.2;
  pointer-events: none;
}

</style>
</head>
<body>

<div class="card" id="card">
  <div class="glare" id="glare"></div>
  <div id="user">
    <h2>Click Below</h2>
    <p>Generate a random user</p>
    <button id="generateBtn">Generate User</button>
  </div>
</div>

<div class="watermark">Nava</div>

<script>

const card = document.getElementById("card");
const glare = document.getElementById("glare");
const userContainer = document.getElementById("user");

/* 3D Tilt Effect */
card.addEventListener("mousemove", (e) => {
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  const rotateX = -(y - centerY) / 15;
  const rotateY = (x - centerX) / 15;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

  glare.style.opacity = "1";
  glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.5), transparent 60%)`;
});

card.addEventListener("mouseleave", () => {
  card.style.transform = "rotateX(0deg) rotateY(0deg)";
  glare.style.opacity = "0";
});

/* Fetch Random User */
async function fetchData() {
  try {
    userContainer.innerHTML = "<p>Loading...</p>";

    const response = await fetch("https://randomuser.me/api/");
    const data = await response.json();
    const user = data.results[0];

    const name = `${user.name.title} ${user.name.first} ${user.name.last}`;
    const image = user.picture.large;
    const email = user.email;
    const country = user.location.country;
    const age = user.dob.age;

    userContainer.innerHTML = `
      <img src="${image}" alt="${name}">
      <h2>${name}</h2>
      <p>Age: ${age}</p>
      <p>${email}</p>
      <p>${country}</p>
      <button id="generateBtn">Generate User</button>
    `;

    document.getElementById("generateBtn")
      .addEventListener("click", fetchData);

  } catch (err) {
    userContainer.innerHTML = "<p>Failed to fetch user.</p>";
  }
}

document.getElementById("generateBtn")
  .addEventListener("click", fetchData);

</script>

</body>
</html>
